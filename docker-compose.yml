services:
  # 后端 API
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: campus-circle-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./app/infrastructure/data/campus_circle.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEBUG=false
      - SECRET_KEY=your-secret-key-change-here
    volumes:
      - sqlite_data:/app/app/infrastructure/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: campus-circle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 前端 Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: campus-circle-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
