version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-circle-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./app/infrastructure/data/campus_circle.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEBUG=false
    volumes:
      - sqlite_data:/app/app/infrastructure/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: campus-circle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
  redis_data:
