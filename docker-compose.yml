services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: campus-circle-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_circle
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 后端 API
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: campus-circle-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://root:root123@mysql:3306/campus_circle?charset=utf8mb4
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEBUG=false
      - SECRET_KEY=your-secret-key-change-here
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: campus-circle-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # 前端 Nginx
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: campus-circle-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
